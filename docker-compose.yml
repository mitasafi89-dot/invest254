version: '3.8'

services:
  # PostgreSQL database (Supabase alternative for local dev)
  postgres:
    image: postgres:15-alpine
    container_name: invest254-postgres
    environment:
      POSTGRES_USER: invest254
      POSTGRES_PASSWORD: invest254_dev_password
      POSTGRES_DB: invest254
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invest254"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: invest254-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Game Engine (WebSocket)
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invest254-engine
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://invest254:invest254_dev_password@postgres:5432/invest254
      REDIS_URL: redis://redis:6379
      MASTER_SEED: "dev-seed-12345"
      SUPABASE_JWT_SECRET: "dev-jwt-secret-change-in-production"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm -w @invest254/engine start

  # REST API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invest254-api
    environment:
      NODE_ENV: development
      PORT: 8081
      DATABASE_URL: postgresql://invest254:invest254_dev_password@postgres:5432/invest254
      REDIS_URL: redis://redis:6379
      SUPABASE_JWT_SECRET: "dev-jwt-secret-change-in-production"
      MPESA_CONSUMER_KEY: "your-mpesa-key"
      MPESA_CONSUMER_SECRET: "your-mpesa-secret"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm -w @invest254/api start

  # Frontend (Next.js)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: invest254-web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8081/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api
      - engine

volumes:
  postgres_data:
