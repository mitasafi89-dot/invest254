# Root Fly.io config — the Invest254 REST API.
# Deploy:  fly deploy
# URL:     https://invest254.fly.dev/api/v1
#
# The WebSocket engine runs as a SEPARATE app on its own 443 (see fly.engine.toml),
# so both ride Fly's free shared IPv4 on port 443 — no dedicated IP required.

app            = "invest254"
primary_region = "jnb"           # Johannesburg — Fly's closest region to Kenya

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT     = "8081"              # API port (this app runs the API process only)

# Run ONLY the API here (overrides the Dockerfile's combined CMD).
[processes]
  app = "npm -w @invest254/api start"

[http_service]
  internal_port        = 8081
  force_https          = true
  auto_stop_machines   = "off"   # keep at least one machine warm
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "10s"
    method       = "GET"
    path         = "/api/v1/health"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
